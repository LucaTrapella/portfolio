<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luca Trapella — Portfolio</title>
  <!-- Stylesheet principale — i design token (colori, font) vivono in :root di style.css -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── CONTENUTO PRINCIPALE ──────────────────
       Contenitore centrato con intro, controlli
       e la griglia di card renderizzata dinamicamente.
  ─────────────────────────────────────────── -->
  <div id="main">

    <!-- Blocco intro: foto sinistra + testo destra -->
    <div class="intro">

      <!-- Colonna sinistra: foto -->
      <div class="intro-photo">
        <img src="images/io.png" alt="Luca Trapella">
      </div>

      <!-- Colonna destra: nome pixel, contatti, titolo, descrizione -->
      <div class="intro-text">

        <!-- Riga superiore: nome a sinistra, icone contatto a destra -->
        <div class="intro-text-top">
          <div class="intro-name-pixel">Luca Trapella</div>

          <div class="intro-contacts">
            <!-- Email — cambia l'href con il tuo indirizzo -->
            <a class="intro-contact-btn" href="mailto:luca02t@gmail.com" title="Email">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                   stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16"/>
                <polyline points="2,4 12,13.5 22,4"/>
              </svg>
            </a>
            <!-- GitHub — cambia l'href con il tuo profilo -->
            <a class="intro-contact-btn" href="https://github.com/LucaTrapella" target="_blank" rel="noopener noreferrer" title="GitHub">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
              </svg>
            </a>
          </div>
        </div>

        <h1>Master's student in<br>Music &amp; Acoustic Engineering.</h1>

        <div class="intro-location">Milano, IT</div>

        <p>Working at the intersection of music, audio engineering, and artificial intelligence — building tools that bridge the creative and technical dimensions of sound.</p>
      </div>

    </div>

    <!-- Barra controlli: ordinamento (sinistra) + ricerca (destra) -->
    <div class="controls">
      <div class="sort-group">
        <!-- Il valore di data-sort viene letto da JS per impostare sortMode ('chrono' o 'alpha') -->
        <button class="sort-btn active" data-sort="chrono">chrono</button>
        <button class="sort-btn" data-sort="alpha">a–z</button>
      </div>

      <!-- Dropdown filtro per tag — le opzioni sono popolate dinamicamente da JS -->
      <div class="tag-filter-wrap">
        <select id="tagFilter" class="tag-filter">
          <option value="">all</option>
        </select>
      </div>
      <div class="search-wrap">
        <!-- Icona decorativa (pointer-events: none per non bloccare il click sull'input) -->
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="6.5" cy="6.5" r="5"/>
          <line x1="10.5" y1="10.5" x2="14" y2="14"/>
        </svg>
        <input class="search-input" type="text" id="searchInput" placeholder="search...">
      </div>
    </div>

    <!-- Le card vengono iniettate qui da renderCards() in script.js -->
    <div class="cards-grid" id="cardsGrid"></div>

    <!-- Footer: nome a sinistra, anno a destra -->
    <div class="footer">
      <span class="footer-year">Luca Trapella - 2026</span>
    </div>

  </div><!-- /#main -->

  <!-- ── BOLLA DI TRANSIZIONE ───────────────────
       Copre il viewport tramite clip-path circle
       che si espande dal centro della card cliccata.
       Il colore sfondo viene impostato da JS uguale alla card.
       z-index: 400 (sopra #main, sotto #detail)
  ─────────────────────────────────────────── -->
  <div id="bubble"></div>

  <!-- ── VISTA DETTAGLIO ───────────────────────
       Overlay fullscreen che appare dopo l'espansione
       della bolla. Il contenuto è iniettato da
       openDetail() in script.js.
       z-index: 500 (sopra la bolla)
  ─────────────────────────────────────────── -->
  <div id="detail">
    <!-- detailWrap: area di contenuto scrollabile, sfondo uguale al colore card -->
    <div class="detail-wrap" id="detailWrap"></div>
  </div>

  <!-- ── PULSANTE BACK ─────────────────────────
       Fixed in alto a sinistra, visibile (opacity: 1)
       solo quando il dettaglio è aperto (classe .show aggiunta da JS).
       z-index: 600 (sopra tutto)
  ─────────────────────────────────────────── -->
  <div id="back">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"
         stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="11 4 6 9 11 14"/>
    </svg>
  </div>

  <!-- ── LIGHTBOX ──────────────────────────────
       Overlay per visualizzare un'immagine ingrandita.
       Appare cliccando su un'immagine nel dettaglio.
       z-index: 700 (sopra tutto il resto)
  ─────────────────────────────────────────── -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <!-- JS principale — dati, rendering e logica di interazione -->
  <script src="script.js"></script>

</body>
</html>
